site_name: SK SharePoint Webparts
site_description: Documentation portal for SPFx governance command web parts
site_url: https://sudharsank.github.io/sk-webpart-docs/
repo_url: https://github.com/sudharsank/sk-webpart-docs.git
edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/img/glassops-logo.svg
  favicon: assets/img/prh-welcome-light.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue grey
      accent: teal
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: blue grey
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight
  - pymdownx.snippets

plugins:
  - search

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/custom.js

nav:
  - Home: index.md
  - Permission Risk Heatmap:
      - Overview: webparts/prh/index.md
      - Home Screen Tour: webparts/prh/features.md
      - Roles and Operating Model: webparts/prh/roles-and-operating-model.md
      - Workflow Guide: webparts/prh/workflow-guide.md
      - FAQ and Troubleshooting: webparts/prh/troubleshooting.md
      - Platform Notes: webparts/prh/architecture.md
