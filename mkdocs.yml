site_name: Clarix
site_description: Enterprise-grade Microsoft 365 web parts for governance, risk, operations, and productivity. Drop in. Configure. Get results.
site_url: https://sudharsank.github.io/sk-webpart-docs/

theme:
  name: material
  logo: assets/img/logo.png
  favicon: assets/img/favicon.png
  font:
    text: Space Grotesk
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    scheme: default
    primary: custom
    accent: custom

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/custom.js

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: en
  - glightbox
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Web Parts:
      - Catalog: webparts/index.md
      - Permission Risk Heatmap:
          - Overview: webparts/prh/index.md
          - Features: webparts/prh/features.md
          - Roles & Operating Model: webparts/prh/roles-and-operating-model.md
          - Workflow Guide: webparts/prh/workflow-guide.md
          - Troubleshooting: webparts/prh/troubleshooting.md
          - Architecture: webparts/prh/architecture.md
